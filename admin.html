<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Mykyta Bereg</title>
    <link rel="icon" href="data:," />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0a0a0a;
        color: #e0e0e0;
        min-height: 100vh;
      }

      .login-overlay {
        position: fixed;
        inset: 0;
        background: #0a0a0a;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      .login-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      .login-box h2 {
        font-size: 16px;
        font-weight: 500;
        color: #888;
      }
      .login-box input {
        background: #111;
        border: 1px solid #2a2a2a;
        border-radius: 6px;
        padding: 10px 14px;
        font-size: 14px;
        color: #e0e0e0;
        font-family: inherit;
        outline: none;
        width: 240px;
        text-align: center;
        transition: border-color 0.15s ease;
      }
      .login-box input:focus { border-color: #555; }
      .login-box .login-error {
        font-size: 12px;
        color: #ff6b6b;
        height: 16px;
      }
      body.authed .login-overlay { display: none; }

      .admin-header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 32px;
        background: #111;
        border-bottom: 1px solid #222;
      }

      .admin-header h1 {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .admin-header h1 span {
        color: #666;
        font-weight: 400;
      }

      .header-actions {
        display: flex;
        gap: 10px;
      }

      .btn {
        padding: 8px 20px;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .btn-primary {
        background: #fff;
        color: #000;
      }
      .btn-primary:hover { background: #ddd; }

      .btn-secondary {
        background: #222;
        color: #ccc;
        border: 1px solid #333;
      }
      .btn-secondary:hover { background: #2a2a2a; }

      .btn-danger {
        background: #331111;
        color: #ff6b6b;
        border: 1px solid #442222;
      }
      .btn-danger:hover { background: #441818; }

      .btn-small {
        padding: 5px 12px;
        font-size: 12px;
      }

      .admin-content {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px;
      }

      .status-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        padding: 12px 16px;
        background: #111;
        border-radius: 8px;
        border: 1px solid #222;
        font-size: 13px;
        color: #888;
      }

      .status-bar .count { color: #ccc; }

      .project-card {
        background: #111;
        border: 1px solid #222;
        border-radius: 10px;
        margin-bottom: 12px;
        overflow: hidden;
        transition: border-color 0.15s ease;
      }
      .project-card:hover { border-color: #333; }
      .project-card.dragging {
        opacity: 0.5;
        border-color: #555;
      }

      .card-header {
        display: flex;
        align-items: center;
        padding: 14px 18px;
        gap: 16px;
        cursor: pointer;
        user-select: none;
      }

      .drag-handle {
        cursor: grab;
        color: #444;
        font-size: 18px;
        padding: 4px;
        flex-shrink: 0;
      }
      .drag-handle:active { cursor: grabbing; }

      .card-index {
        font-size: 12px;
        color: #555;
        min-width: 24px;
        text-align: center;
        font-variant-numeric: tabular-nums;
      }

      .card-title {
        flex: 1;
        font-size: 15px;
        font-weight: 500;
      }

      .card-year {
        font-size: 13px;
        color: #666;
        margin-right: 8px;
      }

      .card-video-name {
        font-size: 12px;
        color: #444;
        max-width: 200px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .expand-icon {
        color: #555;
        transition: transform 0.2s ease;
        flex-shrink: 0;
      }
      .project-card.open .expand-icon {
        transform: rotate(180deg);
      }

      .card-body {
        display: none;
        padding: 0 18px 18px;
        border-top: 1px solid #1a1a1a;
      }
      .project-card.open .card-body {
        display: block;
        padding-top: 18px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .form-group.full-width {
        grid-column: 1 / -1;
      }

      .form-group label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #666;
        font-weight: 500;
      }

      .form-group input,
      .form-group select {
        background: #0a0a0a;
        border: 1px solid #2a2a2a;
        border-radius: 6px;
        padding: 9px 12px;
        font-size: 14px;
        color: #e0e0e0;
        font-family: inherit;
        outline: none;
        transition: border-color 0.15s ease;
      }
      .form-group input:focus,
      .form-group select:focus {
        border-color: #555;
      }

      .form-group select {
        appearance: none;
        background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23666' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 12px center;
        padding-right: 36px;
      }

      .card-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 16px;
        padding-top: 14px;
        border-top: 1px solid #1a1a1a;
      }

      .video-preview {
        grid-column: 1 / -1;
        margin-top: 4px;
      }

      .video-preview video {
        width: 100%;
        max-height: 200px;
        border-radius: 6px;
        background: #000;
        object-fit: contain;
      }

      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        padding: 12px 20px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 8px;
        font-size: 13px;
        color: #ccc;
        opacity: 0;
        transform: translateY(10px);
        transition: all 0.3s ease;
        z-index: 100;
      }
      .toast.visible {
        opacity: 1;
        transform: translateY(0);
      }
      .toast.success { border-color: #2a5a2a; color: #6bff6b; }
      .toast.error { border-color: #5a2a2a; color: #ff6b6b; }
    </style>
  </head>
  <body>
    <div class="login-overlay" id="loginOverlay">
      <div class="login-box">
        <h2>Admin Access</h2>
        <input type="password" id="passwordInput" placeholder="Password" autofocus />
        <div class="login-error" id="loginError"></div>
      </div>
    </div>

    <div class="admin-header">
      <h1>Mykyta Bereg <span>/ Admin</span></h1>
      <div class="header-actions">
        <button class="btn btn-secondary" onclick="resetToDefaults()">Reset to Defaults</button>
        <button class="btn btn-secondary" onclick="addProject()">+ Add Project</button>
        <button class="btn btn-primary" onclick="saveAll()">Save Changes</button>
      </div>
    </div>

    <div class="admin-content">
      <div class="status-bar">
        <span><span class="count" id="projectCount">0</span> projects</span>
        <span id="statusText">Loading...</span>
      </div>
      <div id="projectList"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const PASS_HASH = '6e99540da31f48d03c21ad33f24c149550073497e7f45d22d48dcfcac01d406b';

      async function hashPassword(pw) {
        const encoded = new TextEncoder().encode(pw);
        const buffer = await crypto.subtle.digest('SHA-256', encoded);
        return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join('');
      }

      function checkAuth() {
        if (sessionStorage.getItem('bereg_admin_auth') === 'true') {
          document.body.classList.add('authed');
          return true;
        }
        return false;
      }

      const pwInput = document.getElementById('passwordInput');
      const loginError = document.getElementById('loginError');

      pwInput.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
          const hash = await hashPassword(pwInput.value);
          if (hash === PASS_HASH) {
            sessionStorage.setItem('bereg_admin_auth', 'true');
            document.body.classList.add('authed');
          } else {
            loginError.textContent = 'Wrong password';
            pwInput.value = '';
            pwInput.focus();
          }
        }
      });

      checkAuth();
    </script>
    <script src="./projects-data.js"></script>
    <script>
      let projects = getProjects();
      let videoFiles = [];

      // Scan for available video files
      async function loadVideoFiles() {
        const known = DEFAULT_PROJECTS.map(p => p.video);
        const stored = projects.map(p => p.video);
        const all = new Set([...known, ...stored]);
        videoFiles = [...all].sort();
      }

      function showToast(message, type = '') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = 'toast visible ' + type;
        setTimeout(() => { toast.className = 'toast'; }, 2500);
      }

      function render() {
        const list = document.getElementById('projectList');
        document.getElementById('projectCount').textContent = projects.length;

        const hasChanges = JSON.stringify(projects) !== JSON.stringify(getProjects());
        document.getElementById('statusText').textContent = hasChanges ? 'Unsaved changes' : 'All changes saved';

        list.innerHTML = '';
        projects.forEach((p, i) => {
          const card = document.createElement('div');
          card.className = 'project-card';
          card.draggable = true;
          card.dataset.index = i;

          card.innerHTML = `
            <div class="card-header" onclick="toggleCard(this)">
              <span class="drag-handle" title="Drag to reorder">⠿</span>
              <span class="card-index">${i + 1}</span>
              <span class="card-title">${p.name}</span>
              <span class="card-year">${p.year}</span>
              <span class="card-video-name">${p.video.split('/').pop()}</span>
              <span class="expand-icon">▾</span>
            </div>
            <div class="card-body">
              <div class="form-grid">
                <div class="form-group">
                  <label>Project Name</label>
                  <input type="text" value="${esc(p.name)}" oninput="updateField(${i}, 'name', this.value)" />
                </div>
                <div class="form-group">
                  <label>Year</label>
                  <input type="text" value="${esc(p.year)}" oninput="updateField(${i}, 'year', this.value)" />
                </div>
                <div class="form-group">
                  <label>Director</label>
                  <input type="text" value="${esc(p.director)}" oninput="updateField(${i}, 'director', this.value)" />
                </div>
                <div class="form-group">
                  <label>Production</label>
                  <input type="text" value="${esc(p.production)}" oninput="updateField(${i}, 'production', this.value)" />
                </div>
                <div class="form-group full-width">
                  <label>Description</label>
                  <input type="text" value="${esc(p.description || '')}" oninput="updateField(${i}, 'description', this.value)" placeholder="Project description" />
                </div>
                <div class="form-group full-width">
                  <label>Preview Video (main page / works page)</label>
                  <input type="text" value="${esc(p.video)}" oninput="updateField(${i}, 'video', this.value)" placeholder="./videos/filename.mp4" />
                </div>
                <div class="form-group full-width">
                  <label>Full Video URL (project page — leave empty to use preview)</label>
                  <input type="text" value="${esc(p.videoFull || '')}" oninput="updateField(${i}, 'videoFull', this.value)" placeholder="https://your-r2-bucket.r2.dev/full-video.mp4" />
                </div>
                <div class="video-preview">
                  <video src="${esc(p.video)}" muted controls preload="metadata"></video>
                </div>
              </div>
              <div class="card-actions">
                <button class="btn btn-secondary btn-small" onclick="duplicateProject(${i})">Duplicate</button>
                <button class="btn btn-secondary btn-small" onclick="moveProject(${i}, -1)">↑ Move Up</button>
                <button class="btn btn-secondary btn-small" onclick="moveProject(${i}, 1)">↓ Move Down</button>
                <button class="btn btn-danger btn-small" onclick="removeProject(${i})">Delete</button>
              </div>
            </div>
          `;

          // Drag events
          card.addEventListener('dragstart', (e) => {
            card.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', i);
          });
          card.addEventListener('dragend', () => {
            card.classList.remove('dragging');
          });
          card.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
          });
          card.addEventListener('drop', (e) => {
            e.preventDefault();
            const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
            const toIndex = i;
            if (fromIndex !== toIndex) {
              const item = projects.splice(fromIndex, 1)[0];
              projects.splice(toIndex, 0, item);
              render();
            }
          });

          list.appendChild(card);
        });
      }

      function esc(str) {
        return String(str).replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function toggleCard(header) {
        header.closest('.project-card').classList.toggle('open');
      }

      function updateField(index, field, value) {
        projects[index][field] = value;
        // Live update header text
        const card = document.querySelectorAll('.project-card')[index];
        if (field === 'name') card.querySelector('.card-title').textContent = value;
        if (field === 'year') card.querySelector('.card-year').textContent = value;
        if (field === 'video') {
          card.querySelector('.card-video-name').textContent = value.split('/').pop();
          card.querySelector('.video-preview video').src = value;
        }
        document.getElementById('statusText').textContent = 'Unsaved changes';
      }

      function addProject() {
        projects.push({
          name: 'New Project',
          year: new Date().getFullYear().toString(),
          video: './videos/',
          videoFull: '',
          director: 'Director Name',
          production: 'Production Name',
          description: ''
        });
        render();
        // Open the new card
        const cards = document.querySelectorAll('.project-card');
        cards[cards.length - 1].classList.add('open');
        cards[cards.length - 1].scrollIntoView({ behavior: 'smooth' });
      }

      function removeProject(index) {
        if (projects.length <= 1) {
          showToast('Cannot delete the last project', 'error');
          return;
        }
        const name = projects[index].name;
        if (confirm(`Delete "${name}"?`)) {
          projects.splice(index, 1);
          render();
          showToast(`"${name}" deleted`);
        }
      }

      function duplicateProject(index) {
        const copy = { ...projects[index] };
        copy.name += ' (Copy)';
        projects.splice(index + 1, 0, copy);
        render();
        showToast('Project duplicated');
      }

      function moveProject(index, direction) {
        const newIndex = index + direction;
        if (newIndex < 0 || newIndex >= projects.length) return;
        const item = projects.splice(index, 1)[0];
        projects.splice(newIndex, 0, item);
        render();
      }

      function saveAll() {
        saveProjects(projects);
        render();
        showToast('Changes saved', 'success');
      }

      function resetToDefaults() {
        if (confirm('Reset all projects to default values? This will discard all your edits.')) {
          localStorage.removeItem('bereg_projects');
          projects = [...DEFAULT_PROJECTS.map(p => ({ ...p }))];
          render();
          showToast('Reset to defaults', 'success');
        }
      }

      // Init
      loadVideoFiles();
      render();
    </script>
  </body>
</html>
