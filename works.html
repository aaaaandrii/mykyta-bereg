<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mykyta Bereg — Works" />
    <title>Works — Mykyta Bereg</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="page-works">
    <!-- Background Videos -->
    <div class="works-video-bg" id="worksVideoBg"></div>

    <!-- Page Content -->
    <div class="page-wrapper">
      <!-- Top Navigation -->
      <header class="header">
        <span onclick="navigateTo('index.html')" class="logo">Mykyta Bereg</span>
        <div class="header-nav">
          <span onclick="navigateTo('works.html')" class="nav-link active-link">Works</span>
          <span onclick="navigateTo('about.html')" class="nav-link">About</span>
          <span onclick="navigateTo('contact.html')" class="nav-link">Contact</span>
        </div>
      </header>

      <script>
        function navigateTo(url) { window.location.href = url; }
      </script>

      <!-- Works List - Triple for infinite scroll illusion -->
      <div class="works-list" id="worksList"></div>
    </div>

    <script src="./projects-data.js"></script>
    <script>
      const projects = getProjects();
      const totalVideos = projects.length;
      const _mobile = 'ontouchstart' in window || window.innerWidth <= 768;

      // Generate background videos (lazy - no source yet)
      const videoBgContainer = document.getElementById('worksVideoBg');
      projects.forEach((p, i) => {
        const video = document.createElement('video');
        video.className = 'works-video';
        video.dataset.index = i;
        video.dataset.src = p.video;
        video.muted = true;
        video.loop = true;
        video.playsInline = true;
        video.preload = 'none';
        videoBgContainer.appendChild(video);
      });

      const worksVideoLoaded = new Set();
      const worksPosterCache = {};

      function loadWorksVideo(idx) {
        if (worksVideoLoaded.has(idx)) return;
        var video = worksVideos[idx];
        if (!video) return;
        var src = video.dataset.src;
        if (!src) return;
        if (!video.querySelector('source')) {
          var source = document.createElement('source');
          source.src = src;
          source.type = 'video/mp4';
          video.appendChild(source);
        }
        video.preload = 'metadata';
        video.load();
        worksVideoLoaded.add(idx);

        video.addEventListener('loadeddata', function cap() {
          video.removeEventListener('loadeddata', cap);
          try {
            var scale = _mobile ? 0.25 : 0.5;
            var c = document.createElement('canvas');
            c.width = video.videoWidth * scale;
            c.height = video.videoHeight * scale;
            c.getContext('2d').drawImage(video, 0, 0, c.width, c.height);
            worksPosterCache[idx] = c.toDataURL('image/jpeg', _mobile ? 0.5 : 0.7);
            video.style.backgroundImage = 'url(' + worksPosterCache[idx] + ')';
            video.style.backgroundSize = 'cover';
            video.style.backgroundPosition = 'center';
          } catch (e) {}
        }, { once: true });
      }

      function unloadWorksVideo(idx) {
        if (!worksPosterCache[idx]) return;
        var video = worksVideos[idx];
        if (!video) return;
        video.pause();
        video.removeAttribute('src');
        var s = video.querySelector('source');
        if (s) s.removeAttribute('src');
        video.load();
        video.preload = 'none';
        worksVideoLoaded.delete(idx);
      }

      // Generate works list (5 sets for infinite scroll)
      const worksList = document.getElementById('worksList');
      const numSets = 5;
      const middleSet = 2;
      let itemIndex = 0;
      for (let set = 0; set < numSets; set++) {
        projects.forEach((p, videoIdx) => {
          const div = document.createElement('div');
          div.className = 'works-item' + (set === middleSet && videoIdx === 0 ? ' active' : '');
          div.dataset.index = itemIndex;
          div.dataset.video = videoIdx;
          div.innerHTML = `<span class="work-name">${p.name}</span><span class="work-date">${p.year}</span>`;
          worksList.appendChild(div);
          itemIndex++;
        });
      }

      const worksItems = document.querySelectorAll('.works-item');
      const worksVideos = document.querySelectorAll('.works-video');

      const totalItems = worksItems.length;
      const startIndex = totalVideos * middleSet;

      let currentIndex = startIndex;

      let velocity = 0;
      let lastScrollTime = 0;
      let inertiaFrame = null;

      function centerActiveItem(index) {
        const activeItem = worksItems[index];
        const viewportCenter = window.innerHeight / 2;
        let offset = 0;
        for (let i = 0; i < index; i++) {
          offset += worksItems[i].offsetHeight;
        }
        offset += activeItem.offsetHeight / 2;
        const translateY = viewportCenter - offset;
        worksList.style.transform = `translateY(${translateY}px)`;
      }

      function setActiveItem(index, skipAnimation = false) {
        if (index < 0) {
          index = totalItems - 1;
        } else if (index >= totalItems) {
          index = 0;
        }

        if (index === currentIndex) return;

        worksItems.forEach((item, i) => {
          item.classList.remove('active');
          if (i === index) {
            item.classList.add('active');
          }
        });

        centerActiveItem(index);

        const videoIndex = parseInt(worksItems[index].dataset.video);
        const prevVideoIndex = parseInt(worksItems[currentIndex].dataset.video);

        if (videoIndex !== prevVideoIndex) {
          loadWorksVideo(videoIndex);
          var next1 = (videoIndex + 1) % totalVideos;
          var prev1 = (videoIndex - 1 + totalVideos) % totalVideos;
          loadWorksVideo(next1);
          loadWorksVideo(prev1);

          worksVideos.forEach((video, i) => {
            if (i === prevVideoIndex) {
              video.classList.remove('active');
              video.pause();
            }
            if (i === videoIndex) {
              video.classList.add('active');
              video.preload = 'auto';
              video.play().catch(() => {});
            }
          });

          if (_mobile) {
            worksVideos.forEach((video, i) => {
              if (i === videoIndex || i === next1 || i === prev1) return;
              var dist = Math.min(Math.abs(i - videoIndex), totalVideos - Math.abs(i - videoIndex));
              if (dist > 2 && worksPosterCache[i]) unloadWorksVideo(i);
            });
          }
        }

        currentIndex = index;

        const middleStart = totalVideos * middleSet;
        const middleEnd = totalVideos * (middleSet + 1) - 1;

        if (currentIndex < middleStart || currentIndex > middleEnd) {
          const videoIdx = parseInt(worksItems[currentIndex].dataset.video);
          const newIndex = middleStart + videoIdx;

          worksList.style.transition = 'none';

          worksItems.forEach((item, i) => {
            item.classList.remove('active');
            if (i === newIndex) {
              item.classList.add('active');
            }
          });

          centerActiveItem(newIndex);
          currentIndex = newIndex;

          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              worksList.style.transition = '';
            });
          });
        }

      }

      function init() {
        centerActiveItem(startIndex);
        loadWorksVideo(0);
        loadWorksVideo(1);
        worksVideos[0].classList.add('active');
        worksVideos[0].preload = 'auto';
        worksVideos[0].play().catch(() => {});
        if (!_mobile) {
          var i = 0;
          function preloadNext() {
            if (i >= totalVideos) return;
            loadWorksVideo(i);
            i++;
            setTimeout(preloadNext, 300);
          }
          setTimeout(preloadNext, 2000);
        }
      }

      window.addEventListener('resize', () => {
        centerActiveItem(currentIndex);
      });

      worksItems.forEach((item, index) => {
        item.addEventListener('click', () => {
          if (item.classList.contains('active')) {
            const videoIndex = parseInt(item.dataset.video);
            window.location.href = `project.html?id=${videoIndex}`;
          } else {
            setActiveItem(index);
          }
        });
      });

      init();

      const videoBg = document.getElementById('worksVideoBg');
      videoBg.addEventListener('click', () => {
        const videoIndex = parseInt(worksItems[currentIndex].dataset.video);
        window.location.href = `project.html?id=${videoIndex}`;
      });

      const scrollThreshold = 168;
      let scrollAccumulator = 0;

      function processInertia() {
        if (Math.abs(velocity) > 0.5) {
          velocity *= 0.85;
          scrollAccumulator += velocity;

          if (Math.abs(scrollAccumulator) >= scrollThreshold) {
            if (scrollAccumulator > 0) {
              setActiveItem(currentIndex + 1);
            } else {
              setActiveItem(currentIndex - 1);
            }
            scrollAccumulator = 0;
          }

          inertiaFrame = requestAnimationFrame(processInertia);
        } else {
          velocity = 0;
          scrollAccumulator = 0;
        }
      }

      window.addEventListener('wheel', (e) => {
        e.preventDefault();
        const now = Date.now();
        lastScrollTime = now;
        velocity += e.deltaY * 0.3;
        velocity = Math.max(-50, Math.min(50, velocity));

        if (inertiaFrame) {
          cancelAnimationFrame(inertiaFrame);
        }

        scrollAccumulator += e.deltaY;

        if (Math.abs(scrollAccumulator) >= scrollThreshold) {
          if (scrollAccumulator > 0) {
            setActiveItem(currentIndex + 1);
          } else {
            setActiveItem(currentIndex - 1);
          }
          scrollAccumulator = 0;
        }

        inertiaFrame = requestAnimationFrame(processInertia);
      }, { passive: false });

      let touchStartY = 0;
      const touchThreshold = 42;

      window.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
        if (inertiaFrame) {
          cancelAnimationFrame(inertiaFrame);
          velocity = 0;
        }
      }, { passive: true });

      window.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const currentY = e.touches[0].clientY;
        const delta = touchStartY - currentY;

        if (Math.abs(delta) >= touchThreshold) {
          if (delta > 0) {
            setActiveItem(currentIndex + 1);
          } else {
            setActiveItem(currentIndex - 1);
          }
          touchStartY = currentY;
        }
      }, { passive: false });

      window.addEventListener('touchend', () => {
        touchStartY = 0;
      }, { passive: true });

      window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
          e.preventDefault();
          setActiveItem(currentIndex + 1);
        } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
          e.preventDefault();
          setActiveItem(currentIndex - 1);
        }
      });
    </script>
    <div class="copyright">All Rights Reserved 2026</div>
  </body>
</html>
