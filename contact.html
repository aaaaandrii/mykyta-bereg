<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mykyta Bereg is a Ukrainian-born, award-winning editor and art director." />
    <meta property="og:title" content="Contact — Mykyta Bereg" />
    <meta property="og:description" content="Mykyta Bereg is a Ukrainian-born, award-winning editor and art director." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://oveay.com/contact" />
    <meta property="og:image" content="https://oveay.com/og-image.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Contact — Mykyta Bereg" />
    <meta name="twitter:description" content="Mykyta Bereg is a Ukrainian-born, award-winning editor and art director." />
    <meta name="twitter:image" content="https://oveay.com/og-image.jpg" />
    <title>Contact — Mykyta Bereg</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="page-contact">
    <!-- Page Content -->
    <div class="page-wrapper">
      <!-- Top Navigation - Evenly distributed -->
      <header class="header">
        <span onclick="navigateTo('./')" class="logo">Mykyta Bereg</span>
        <div class="header-nav">
          <span onclick="navigateTo('./works')" class="nav-link">Works</span>
          <span onclick="navigateTo('./about')" class="nav-link">About</span>
          <span onclick="navigateTo('./contact')" class="nav-link active-link">Contact</span>
        </div>
      </header>
      
      <script>
        function navigateTo(url) { window.location.href = url; }
      </script>

      <!-- Contact Info - 3 Columns -->
      <div class="contact-columns" id="contactColumns"></div>

      <!-- Social Links - Bottom Center -->
      <div class="social-links social-links-center" id="socialLinks"></div>

      <script src="./projects-data.js"></script>
      <script>
        (function() {
          var contacts = getContacts();
          var socials = getSocials();
          var colsEl = document.getElementById('contactColumns');
          contacts.forEach(function(c) {
            var div = document.createElement('div');
            div.className = 'contact-column';
            div.innerHTML = '<div class="contact-region">' + c.region + '</div>' +
              '<div class="contact-details">' +
              '<a href="mailto:' + c.email + '" class="contact-email">' + c.email + '</a>' +
              '<a href="tel:' + c.phone.replace(/[.\s]/g, '') + '" class="contact-phone">' + c.phone + '</a>' +
              '</div>';
            colsEl.appendChild(div);
          });
          var linksEl = document.getElementById('socialLinks');
          socials.forEach(function(s) {
            var a = document.createElement('a');
            a.href = s.url;
            a.target = '_blank';
            a.rel = 'noreferrer';
            a.className = 'social-link';
            a.textContent = s.name;
            linksEl.appendChild(a);
          });
        })();
      </script>
    </div>

    <script>
      (function() {
        var columns = document.querySelectorAll('.contact-column');
        columns.forEach(function(col) {
          col.addEventListener('mouseenter', function() {
            col.classList.add('revealed');
          });
        });
        setTimeout(function() {
          columns.forEach(function(col, i) {
            setTimeout(function() {
              col.style.transition = 'opacity 1s ease';
              col.style.opacity = '1';
            }, i * 500);
          });
        }, 50);
      })();
    </script>
  </body>
</html>
