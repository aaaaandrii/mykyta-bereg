<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mykyta Bereg is a Ukrainian-born, award-winning editor and art director." />
    <meta property="og:title" content="Mykyta Bereg" />
    <meta property="og:description" content="Mykyta Bereg is a Ukrainian-born, award-winning editor and art director." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://oveay.com/" />
    <meta property="og:image" content="https://oveay.com/og-image.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mykyta Bereg" />
    <meta name="twitter:description" content="Mykyta Bereg is a Ukrainian-born, award-winning editor and art director." />
    <meta name="twitter:image" content="https://oveay.com/og-image.jpg" />
    <title>Mykyta Bereg</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- Fullscreen Background Videos -->
    <div class="background-videos" id="backgroundVideos"></div>

    <!-- Page Content -->
    <div class="page-wrapper">
      <!-- Top Navigation -->
      <header class="header">
        <span onclick="navigateTo('index.html')" class="logo">Mykyta Bereg</span>
        <div class="header-nav">
          <span onclick="navigateTo('works.html')" class="nav-link">Works</span>
          <span onclick="navigateTo('about.html')" class="nav-link">About</span>
          <span onclick="navigateTo('contact.html')" class="nav-link">Contact</span>
        </div>
      </header>

      <!-- Fullscreen Click Area -->
      <div class="fullscreen-link" id="projectLink"></div>

      <!-- Project Info - Bottom -->
      <div class="project-info">
        <div class="project-name" id="projectName"></div>
      </div>
    </div>

    <div class="copyright">All Rights Reserved 2026</div>

    <script src="./projects-data.js"></script>
    <script src="./script.js"></script>
    <script>
      (function() {
        var isMobile = window.innerWidth <= 768;
        if (isMobile) return;
        if (sessionStorage.getItem('introPlayed')) return;

        sessionStorage.setItem('introPlayed', '1');

        var logo = document.querySelector('.logo');
        var nav = document.querySelector('.header-nav');
        var projectInfo = document.querySelector('.project-info');
        var copyright = document.querySelector('.copyright');

        nav.style.opacity = '0';
        nav.style.transition = 'opacity 0.3s cubic-bezier(0, 0, 0.2, 1)';
        if (projectInfo) { projectInfo.style.opacity = '0'; projectInfo.style.transition = 'opacity 0.3s cubic-bezier(0, 0, 0.2, 1)'; }
        if (copyright) { copyright.style.opacity = '0'; copyright.style.transition = 'opacity 0.3s cubic-bezier(0, 0, 0.2, 1)'; }

        logo.style.position = 'fixed';
        logo.style.top = '50%';
        logo.style.left = '50%';
        logo.style.transform = 'translate(-50%, -50%)';
        logo.style.transition = 'none';
        logo.style.zIndex = '200';

        setTimeout(function() {
          logo.style.transition = 'top 1s ease, transform 1s ease';
          logo.style.top = '5pt';
          logo.style.transform = 'translateX(-50%)';
        }, 800);

        setTimeout(function() {
          logo.style.position = '';
          logo.style.zIndex = '';
          nav.style.opacity = '1';
          if (projectInfo) projectInfo.style.opacity = '1';
          if (copyright) copyright.style.opacity = '1';
        }, 1900);
      })();
    </script>
  </body>
</html>
