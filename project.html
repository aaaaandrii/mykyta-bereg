<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mykyta Bereg is a Ukrainian-born, award-winning editor and art director." />
    <meta property="og:title" content="Mykyta Bereg" />
    <meta property="og:description" content="Mykyta Bereg is a Ukrainian-born, award-winning editor and art director." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://oveay.com/" />
    <meta property="og:image" content="https://oveay.com/og-image.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mykyta Bereg" />
    <meta name="twitter:description" content="Mykyta Bereg is a Ukrainian-born, award-winning editor and art director." />
    <meta name="twitter:image" content="https://oveay.com/og-image.jpg" />
    <title>Project — Mykyta Bereg</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="page-project">
    <script>
      function navigateTo(url) { window.location.href = url; }
    </script>

    <!-- Fullscreen background video -->
    <div class="project-video-bg" id="videoBg">
      <video id="projectVideo" class="project-video-fullscreen" playsinline muted loop>
        <source src="" type="video/mp4">
      </video>
    </div>

    <!-- Header -->
    <header class="header" id="header">
      <span onclick="navigateTo('index.html')" class="logo">Mykyta Bereg</span>
      <div class="header-nav">
        <span onclick="navigateTo('works.html')" class="nav-link">Works</span>
        <span onclick="navigateTo('about.html')" class="nav-link">About</span>
        <span onclick="navigateTo('contact.html')" class="nav-link">Contact</span>
      </div>
    </header>

    <!-- Project title top-left -->
    <div class="project-page-title-wrap">
      <h1 class="project-page-title" id="projectTitle">Project Name</h1>
      <span class="project-page-year" id="projectYear"></span>
    </div>

    <!-- Project navigation arrows -->
    <div class="project-nav-arrow project-nav-prev" id="navPrev">←</div>
    <div class="project-nav-arrow project-nav-next" id="navNext">→</div>

    <!-- Center info overlay (fades out after 2s) -->
    <div class="project-center-info" id="centerInfo">
      <h2 class="center-info-title" id="centerInfoTitle"></h2>
      <p class="center-info-desc" id="centerInfoDesc"></p>
    </div>

    <!-- Bottom bar: credits + player controls -->
    <div class="project-bottom-bar" id="projectBottomBar">
      <div class="project-bottom-title" id="projectBottomTitle">
        <span class="project-page-title" id="projectTitleMobile"></span>
        <span class="project-page-year" id="projectYearMobile"></span>
      </div>
      <div class="project-bottom-credits">
        <div class="project-credit-bl" id="creditDirector">
          <span class="credit-label">Director</span>
          <span class="credit-value" id="projectDirector">Name</span>
        </div>
        <div class="project-credit-br" id="creditProduction">
          <span class="credit-label">Production</span>
          <span class="credit-value" id="projectProduction">Name</span>
        </div>
      </div>

      <div class="project-player-controls" id="playerControls">
        <button class="ctrl-btn" id="playPauseBtn" title="Play/Pause">
          <svg class="icon-play" width="14" height="14" viewBox="0 0 14 14" fill="white" style="display:none;">
            <path d="M2 0L13 7L2 14V0Z"/>
          </svg>
          <svg class="icon-pause" width="14" height="14" viewBox="0 0 14 14" fill="white">
            <rect x="1" y="0" width="4" height="14"/>
            <rect x="9" y="0" width="4" height="14"/>
          </svg>
        </button>

        <span class="ctrl-time" id="timeCurrent">00:00</span>

        <input type="range" class="scrubber-range" id="scrubberRange" min="0" max="1000" value="0" step="1">

        <span class="ctrl-time" id="timeDuration">00:00</span>

        <button class="ctrl-btn" id="volumeBtn" title="Mute/Unmute">
          <svg class="icon-vol-on" width="16" height="14" viewBox="0 0 16 14" fill="white" style="display:none;">
            <path d="M0 4.5H3L7 0.5V13.5L3 9.5H0V4.5Z"/>
            <path d="M10 2.5C11.3 3.5 12 5.2 12 7C12 8.8 11.3 10.5 10 11.5" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            <path d="M10 5C10.6 5.5 11 6.2 11 7C11 7.8 10.6 8.5 10 9" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          </svg>
          <svg class="icon-vol-off" width="16" height="14" viewBox="0 0 16 14" fill="white">
            <path d="M0 4.5H3L7 0.5V13.5L3 9.5H0V4.5Z"/>
            <path d="M10 4.5L15 9.5M15 4.5L10 9.5" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          </svg>
        </button>

        <button class="ctrl-btn" id="fullscreenBtn" title="Fullscreen">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="white">
            <path d="M0 0H4.5V1.5H1.5V4.5H0V0Z"/>
            <path d="M14 0H9.5V1.5H12.5V4.5H14V0Z"/>
            <path d="M0 14H4.5V12.5H1.5V9.5H0V14Z"/>
            <path d="M14 14H9.5V12.5H12.5V9.5H14V14Z"/>
          </svg>
        </button>
      </div>
    </div>

    <script src="./projects-data.js"></script>
    <script>
      (function() {
        var urlParams = new URLSearchParams(window.location.search);
        var projectId = parseInt(urlParams.get('id') || '0');
        var projects = getProjects();
        var project = projects[projectId] || projects[0];

        var prevId = (projectId - 1 + projects.length) % projects.length;
        var nextId = (projectId + 1) % projects.length;

        document.getElementById('navPrev').onclick = function(e) {
          e.stopPropagation();
          window.location.href = 'project.html?id=' + prevId;
        };
        document.getElementById('navNext').onclick = function(e) {
          e.stopPropagation();
          window.location.href = 'project.html?id=' + nextId;
        };

        document.addEventListener('keydown', function(e) {
          if (e.key === 'ArrowLeft') {
            window.location.href = 'project.html?id=' + prevId;
          } else if (e.key === 'ArrowRight') {
            window.location.href = 'project.html?id=' + nextId;
          }
        });

        document.title = project.name + ' — Mykyta Bereg';
        document.getElementById('projectTitle').textContent = project.name;
        document.getElementById('projectYear').textContent = project.year;
        document.getElementById('projectTitleMobile').textContent = project.name;
        document.getElementById('projectYearMobile').textContent = project.year;
        document.getElementById('projectDirector').textContent = project.director;
        document.getElementById('projectProduction').textContent = project.production;

        // Center info overlay
        document.getElementById('centerInfoTitle').textContent = project.name;
        document.getElementById('centerInfoDesc').textContent = project.description || '';

        document.querySelector('#projectVideo source').src = project.videoFull || project.video;

        var video = document.getElementById('projectVideo');
        var scrubber = document.getElementById('scrubberRange');
        var timeCur = document.getElementById('timeCurrent');
        var timeDur = document.getElementById('timeDuration');
        var playPauseBtn = document.getElementById('playPauseBtn');
        var iconPlay = playPauseBtn.querySelector('.icon-play');
        var iconPause = playPauseBtn.querySelector('.icon-pause');
        var volBtn = document.getElementById('volumeBtn');
        var iconVolOn = volBtn.querySelector('.icon-vol-on');
        var iconVolOff = volBtn.querySelector('.icon-vol-off');
        var fsBtn = document.getElementById('fullscreenBtn');
        var centerInfo = document.getElementById('centerInfo');

        video.load();
        video.muted = true;
        video.volume = 1;

        // Autoplay muted
        video.addEventListener('loadeddata', function() {
          video.play().catch(function() {});
        });

        // Fade out center info after 1 second
        setTimeout(function() {
          centerInfo.classList.add('fade-out');
        }, 2000);

        function fmt(s) {
          var m = Math.floor(s / 60);
          var sec = Math.floor(s % 60);
          return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
        }

        var scrubbing = false;

        function syncFill() {
          scrubber.style.setProperty('--progress', (scrubber.value / 10) + '%');
        }

        video.addEventListener('timeupdate', function() {
          if (scrubbing || !video.duration) return;
          scrubber.value = (video.currentTime / video.duration) * 1000;
          syncFill();
          timeCur.textContent = fmt(video.currentTime);
        });

        video.addEventListener('loadedmetadata', function() {
          timeDur.textContent = fmt(video.duration);
        });

        scrubber.addEventListener('input', function() {
          scrubbing = true;
          syncFill();
          if (video.duration) {
            video.currentTime = (scrubber.value / 1000) * video.duration;
            timeCur.textContent = fmt(video.currentTime);
          }
        });
        scrubber.addEventListener('change', function() {
          scrubbing = false;
        });

        // Play/Pause
        function togglePlay() {
          if (video.paused) {
            video.play();
            iconPlay.style.display = 'none';
            iconPause.style.display = 'block';
          } else {
            video.pause();
            iconPlay.style.display = 'block';
            iconPause.style.display = 'none';
          }
        }

        video.onclick = function(e) { e.stopPropagation(); togglePlay(); };
        playPauseBtn.onclick = function(e) { e.stopPropagation(); togglePlay(); };

        video.addEventListener('ended', function() {
          iconPlay.style.display = 'block';
          iconPause.style.display = 'none';
        });

        // Volume mute/unmute
        var savedVol = 1;

        function syncVolIcon() {
          var muted = video.muted || video.volume === 0;
          iconVolOn.style.display = muted ? 'none' : 'block';
          iconVolOff.style.display = muted ? 'block' : 'none';
        }

        volBtn.onclick = function(e) {
          e.stopPropagation();
          if (video.muted) {
            video.muted = false;
            video.volume = savedVol || 1;
          } else {
            savedVol = video.volume;
            video.muted = true;
          }
          syncVolIcon();
        };

        syncVolIcon();

        // Fullscreen (iOS uses webkitEnterFullscreen on video element)
        fsBtn.onclick = function(e) {
          e.stopPropagation();
          if (document.fullscreenElement || document.webkitFullscreenElement) {
            (document.exitFullscreen || document.webkitExitFullscreen).call(document);
          } else if (video.webkitEnterFullscreen) {
            video.webkitEnterFullscreen();
          } else if (video.requestFullscreen) {
            video.requestFullscreen();
          } else {
            var el = document.getElementById('videoBg');
            if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            else if (el.requestFullscreen) el.requestFullscreen();
          }
        };

        // Click outside video/controls to go back
        document.addEventListener('mousedown', function(e) {
          var t = e.target;
          if (t === scrubber) return;
          if (t === video) return;
          if (document.getElementById('projectBottomBar').contains(t)) return;
          if (document.getElementById('header').contains(t)) return;
          if (t.closest('.project-page-title-wrap')) return;
          if (t.closest('.project-center-info')) return;
          if (t.closest('.project-nav-arrow')) return;
          history.back();
        });
      })();
    </script>
  </body>
</html>
